<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Task Manager</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">📋</div>
    <h1 class="login-title">Task <span>Manager</span></h1>
    <p class="login-subtitle">Inicia sesión para ver tus tareas</p>

    <div>
      <div class="mb-3">
        <label class="form-label" for="email">Correo electrónico</label>
        <input type="email" id="email" class="form-control"
          placeholder="tunombre@correo.com" autocomplete="email" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" class="form-control"
          placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button id="login-btn" class="btn-login">🔑 Iniciar sesión</button>
      <div id="error-msg" class="login-error"></div>
    </div>

    <div class="demo-box" style="text-align:center; margin-top:1.2rem;">
      ¿No tienes cuenta?
      <a href="register.html" style="color:var(--red); font-weight:700;">Regístrate aquí</a>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
