<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Task Manager — Gestión de tareas con Web API REST" />
  <title>Task Manager API</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous" />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header  -->
  <header>
    <div class="container">
      <div class="logo-icon">📋</div>
      <h1>Task <span>Manager</span></h1>
      <div class="api-badge">
        <div class="api-dot"></div>
        API: localhost:3000
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="container">

      <section id="add-section" aria-labelledby="add-heading">
        <h2 id="add-heading">Nueva tarea</h2>
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            placeholder="Ej. Revisar apuntes de clase…"
            maxlength="120"
            autocomplete="off"
            aria-label="Título de la nueva tarea"
          />
          <button id="add-btn" aria-label="Agregar tarea">
            <span>+</span> Agregar tarea
          </button>
        </div>
      </section>

      <!-- Lista de tareas -->
      <section id="tasks-section" aria-labelledby="tasks-heading">
        <h2 id="tasks-heading">
          Tareas
          <span id="task-count" aria-live="polite">0</span>
        </h2>

        <!-- Estado de carga -->
        <div id="loading-state" role="status" aria-live="polite">
          <div class="spinner"></div>
          Cargando tareas…
        </div>

        <!-- Lista dinámica -->
        <ul id="task-list" aria-label="Lista de tareas"></ul>

        <!-- Estado vacío -->
        <div id="empty-state" hidden aria-live="polite">
          <div class="empty-icon">📭</div>
          <p>No hay tareas todavía</p>
          <small>Agrega tu primera tarea en el formulario de arriba</small>
        </div>
      </section>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container">
      <p>
        Task Manager API &mdash;
        Proyecto Front-End &bull;
        <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
      </p>
    </div>
  </footer>

  <!-- Contenedor de toasts -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmCwdsFHZMnNP0GRDBN4V/c9mvTuNHkl"
    crossorigin="anonymous"></script>

  <!-- App -->
  <script src="js/script.js"></script>
</body>
</html>
